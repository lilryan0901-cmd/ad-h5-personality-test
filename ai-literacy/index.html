<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI素养闯关站</title>
<style>
:root{--p:#4f7cff;--p2:#7aa2ff;--g:#19b37d;--r:#ff6b6b;--t:#1f2a44;--m:#6b7890;--bg:#f6f9ff;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:PingFang SC,Microsoft YaHei,system-ui,sans-serif;background:linear-gradient(180deg,#eef4ff,#f8fbff);color:var(--t)}.wrap{max-width:980px;margin:0 auto;padding:28px 18px 50px}.hero{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:28px;padding:28px;box-shadow:0 12px 30px rgba(46,88,255,.12);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:220px;height:220px;right:-40px;top:-40px;border-radius:50%;background:rgba(255,255,255,.12)}h1{margin:0 0 10px;font-size:34px}.subtitle{margin:0;font-size:16px;line-height:1.7;max-width:720px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}.stat{background:rgba(255,255,255,.16);border-radius:18px;padding:14px 16px}.stat-label{font-size:13px}.stat-value{margin-top:6px;font-size:26px;font-weight:700}.grid{margin-top:22px;display:grid;grid-template-columns:1.2fr .8fr;gap:20px}.card{background:var(--card);border-radius:22px;box-shadow:0 12px 30px rgba(46,88,255,.12);padding:22px}.card h2{margin:0 0 14px;font-size:22px}.question{font-size:20px;line-height:1.7;margin-bottom:18px;font-weight:600}.options{display:grid;gap:12px}button.option{width:100%;text-align:left;border:2px solid #e4ebff;background:#f8fbff;border-radius:16px;padding:14px 16px;font-size:16px;color:var(--t);cursor:pointer}button.option:hover{border-color:var(--p2);transform:translateY(-1px)}button.option.correct{background:#eafbf4;border-color:#1fc88a}button.option.wrong{background:#fff1f1;border-color:#ff8b8b}button.option:disabled{cursor:default;opacity:1}.feedback{margin-top:16px;padding:14px 16px;border-radius:14px;font-size:15px;line-height:1.7;display:none}.feedback.show{display:block}.feedback.good{background:#eafbf4;color:#0c6c47}.feedback.bad{background:#fff1f1;color:#a13636}.actions{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}.primary,.ghost{border:none;border-radius:14px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer}.primary{background:var(--p);color:#fff}.ghost{background:#edf3ff;color:var(--p)}.tip-list{display:grid;gap:12px}.tip{background:#f8fbff;border:1px solid #e7eeff;border-radius:16px;padding:14px}.tip strong{display:block;margin-bottom:6px}.result-box{text-align:center;padding:18px 10px 6px;display:none}.result-box.show{display:block}.result-score{font-size:54px;font-weight:800;color:var(--p);line-height:1;margin-bottom:10px}.badge{display:inline-block;margin-top:10px;padding:8px 14px;border-radius:999px;font-size:14px;background:#edf3ff;color:var(--p);font-weight:700}.footer-note{margin-top:18px;font-size:14px;color:var(--m);line-height:1.8}@media(max-width:860px){.grid,.stats{grid-template-columns:1fr}h1{font-size:28px}.question{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero">
<h1>AI素养闯关站</h1>
<p class="subtitle">围绕 AI 能力边界、提示词设计、伦理判断与工作流思维设计的轻量互动H5。适合课堂展示、课程作业和现场扫码参与。</p>
<div class="stats"><div class="stat"><div class="stat-label">题目总数</div><div class="stat-value">5</div></div><div class="stat"><div class="stat-label">当前进度</div><div class="stat-value"><span id="progressNow">1</span>/<span id="progressTotal">5</span></div></div><div class="stat"><div class="stat-label">当前得分</div><div class="stat-value" id="score">0</div></div></div>
</section>
<section class="grid">
<div class="card"><h2>互动闯关</h2><div id="quizArea"><div class="question" id="questionText"></div><div class="options" id="optionsBox"></div><div class="feedback" id="feedbackBox"></div><div class="actions"><button class="primary" id="nextBtn" style="display:none">下一题</button><button class="ghost" id="restartBtn">重新开始</button></div></div><div class="result-box" id="resultBox"><div class="result-score" id="finalScore">0</div><div>你的 AI 素养闯关得分</div><div class="badge" id="levelText">继续努力</div><p class="footer-note" id="summaryText"></p><div class="actions" style="justify-content:center"><button class="primary" onclick="restartQuiz()">再玩一次</button></div></div></div>
<div class="card"><h2>课程提示卡</h2><div class="tip-list"><div class="tip"><strong>1. AI 不是答案机</strong>好结果来自清晰的问题定义、场景说明和输出要求。</div><div class="tip"><strong>2. 结构化提问更有效</strong>写清楚角色、目标、语气、结构和限制条件。</div><div class="tip"><strong>3. 警惕“看起来对”</strong>AI生成内容不等于真实可靠，学术内容必须核查。</div><div class="tip"><strong>4. 从工具走向流程</strong>真正的提升是把多个工具组织成完整工作流。</div></div><p class="footer-note">本页面用于《智能传播与新媒体》课程汇报现场互动。</p></div>
</section>
</div>
<script>
const questions=[{q:'如果想让AI帮你写课程汇报提纲，哪种提问更有效？',options:['帮我写一个，随便一点','帮我写课程汇报','请为“AI与传播”课程生成8页PPT提纲，风格简洁，面向研究生课堂展示','给我整一个高级一点的内容'],answer:2,explain:'结构化提问更容易得到稳定结果，需要说明主题、用途、页数、风格和受众。'},{q:'以下哪一项最符合“AI能力边界”的理解？',options:['AI输出流畅，所以一定正确','AI可以替代所有人的独立判断','AI擅长生成和整理，但不天然保证真实性，需要人核查','只要提示词写得长，AI就不会出错'],answer:2,explain:'AI会出现幻觉、误引和逻辑偏差，关键事实仍需人工验证。'},{q:'哪种做法最接近“把AI变成工作流”？',options:['只用一个模型聊天，不做后续整理','先用AI生成结构，再用另一工具做图示，最后人工修改整合','把AI回答原封不动交作业','每次随意提问，不保留经验'],answer:1,explain:'工作流强调分步骤协同：生成、筛选、可视化、修改和输出。'},{q:'如果课程要求做一个互动H5页面，合理的入门路径是什么？',options:['必须先精通高级编程才可以开始','可以先让AI生成基础HTML，再边修改边理解代码','完全不需要看代码，随便复制即可','互动页面和AI课程没有关系'],answer:1,explain:'“先生成、再理解、再修改”适合入门。AI降低门槛，但理解代码结构仍重要。'},{q:'关于AI时代的学习方式，哪种理解更合理？',options:['以后只需要会点按钮操作','最重要的是背更多术语','关键能力是把问题表达清楚、组织工具、完成任务','AI出现后，专业学习没有意义了'],answer:2,explain:'真正稀缺的是问题拆解、结构化表达和把工具转成成果的能力。'}];
let current=0,score=0,locked=false;const questionText=document.getElementById('questionText'),optionsBox=document.getElementById('optionsBox'),feedbackBox=document.getElementById('feedbackBox'),nextBtn=document.getElementById('nextBtn'),restartBtn=document.getElementById('restartBtn'),scoreEl=document.getElementById('score'),progressNow=document.getElementById('progressNow'),progressTotal=document.getElementById('progressTotal'),resultBox=document.getElementById('resultBox'),quizArea=document.getElementById('quizArea'),finalScore=document.getElementById('finalScore'),levelText=document.getElementById('levelText'),summaryText=document.getElementById('summaryText');progressTotal.textContent=questions.length;
function renderQuestion(){locked=false;nextBtn.style.display='none';feedbackBox.className='feedback';feedbackBox.textContent='';progressNow.textContent=current+1;scoreEl.textContent=score;const item=questions[current];questionText.textContent=(current+1)+'. '+item.q;optionsBox.innerHTML='';item.options.forEach((opt,idx)=>{const btn=document.createElement('button');btn.className='option';btn.textContent=opt;btn.onclick=()=>chooseOption(idx,btn);optionsBox.appendChild(btn);});}
function chooseOption(index,btn){if(locked)return;locked=true;const item=questions[current];const buttons=[...document.querySelectorAll('.option')];buttons.forEach((b,i)=>{b.disabled=true;if(i===item.answer)b.classList.add('correct')});if(index===item.answer){score+=20;scoreEl.textContent=score;feedbackBox.className='feedback show good';feedbackBox.textContent='回答正确。'+item.explain}else{btn.classList.add('wrong');feedbackBox.className='feedback show bad';feedbackBox.textContent='这题答错了。'+item.explain}nextBtn.style.display='inline-block';nextBtn.textContent=current===questions.length-1?'查看结果':'下一题'}
function showResult(){quizArea.style.display='none';resultBox.classList.add('show');finalScore.textContent=score;let level='',summary='';if(score===100){level='AI素养达人';summary='你已经比较清晰地理解了AI能力边界、结构化提问和工作流思维。'}else if(score>=80){level='AI应用进阶者';summary='基础已经不错，下一步重点是把提示词能力和项目输出能力结合起来。'}else if(score>=60){level='AI探索者';summary='已经入门，但还需要更多结构化提问和内容核查练习。'}else{level='AI起步选手';summary='建议从清晰提问、拆解任务、反复修改开始，慢慢形成自己的工作流。'}levelText.textContent=level;summaryText.textContent=summary}
function restartQuiz(){current=0;score=0;resultBox.classList.remove('show');quizArea.style.display='block';renderQuestion()}nextBtn.addEventListener('click',()=>{if(current===questions.length-1)showResult();else{current++;renderQuestion()}});restartBtn.addEventListener('click',restartQuiz);renderQuestion();
</script>
</body>
</html>
